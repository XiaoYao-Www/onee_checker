name: Rust Multi-Platform Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ----------------------------
  # 1. 檢查版本與標籤 (Check Version)
  # ----------------------------
  check_version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_changed: ${{ steps.check_tag.outputs.changed }}
    steps:
      - name: 檢出程式碼 (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 讀取 Cargo.toml 版本 (Get Version)
        id: get_version
        shell: bash
        run: |
          # 使用 grep 和 sed 提取版本號，避免編譯
          VERSION=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed 's/version *= *"\(.*\)"/\1/')
          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 檢查標籤是否存在 (Check Tag)
        id: check_tag
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG_NAME="v${VERSION}_Auto"
          
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Skipping build."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG_NAME not found. Proceeding with release."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  # ----------------------------
  # 2. 建置與打包 (Build & Package)
  # ----------------------------
  build:
    name: Build ${{ matrix.target }}
    needs: check_version
    if: needs.check_version.outputs.version_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            ext: .exe
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            ext: ""
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            ext: ""
            use_cross: true

    steps:
      - name: 檢出程式碼 (Checkout)
        uses: actions/checkout@v4

      - name: 安裝 Rust 工具鏈 (Install Rust)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 設定 Cargo 快取 (Cache)
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: 安裝 Cross (Install Cross)
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: 編譯 (Build)
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: 打包壓縮 (Package)
        shell: bash
        run: |
          VERSION="${{ needs.check_version.outputs.version }}"
          BIN_NAME=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].name')
          DIST_DIR="dist/${{ matrix.target }}"
          mkdir -p "$DIST_DIR"

          # 複製執行檔
          cp "target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.ext }}" \
            "$DIST_DIR/${BIN_NAME}-${VERSION}${{ matrix.ext }}"
          
          # 進入目錄打包，避免壓縮檔包含路徑
          cd dist

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # 在 Windows 上使用 PowerShell 內建的壓縮功能
            powershell -Command "Compress-Archive -Path '${{ matrix.target }}/*' -DestinationPath '${BIN_NAME}-${VERSION}-${{ matrix.target }}.zip'"
          else
            # 在 Linux/macOS 上使用 zip
            zip -r "${BIN_NAME}-${VERSION}-${{ matrix.target }}.zip" "${{ matrix.target }}"
          fi

      - name: 上傳構建產物 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.target }}
          path: dist/*.zip

  # ----------------------------
  # 3. 發布 Release (Create Release)
  # ----------------------------
  release:
    name: Create Release
    needs: [check_version, build]
    if: needs.check_version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 檢出程式碼 (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下載構建產物 (Download Artifacts)
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifact-*
          merge-multiple: true

      - name: 產生變更日誌 (Generate Changelog)
        id: changelog
        shell: bash
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Last tag: $LAST_TAG"
          
          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" | tr -d '\r')
          else
            CHANGELOG=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s (%h)" | tr -d '\r')
          fi
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="無變更內容"
          fi
          
          # 使用多行輸出格式
          {
            echo "body<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 建立 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check_version.outputs.version }}_Auto
          name: "Version ${{ needs.check_version.outputs.version }} Auto"
          body: |
            ### 變更內容
            ${{ steps.changelog.outputs.body }}
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
